url: https://patrekieta.github.io/CDCdata/

template:
  bootstrap: 5
  params:
    bootswatch: lumen

development:
  mode: release


home:
  links:
  - text: CDC Data
    href: https://data.cdc.gov/

reference:
  - title: "Authenticate"
    desc: "Create and access your CDC API app token."
    contents:
      - cdc_app_token
      - cdc_get_token
      - cdc_set_token
  - title: "Metadata"
    desc: "Access and search for metadata from various datasets."
    contents:
      - cdc_datasets
      - cdc_metadata
      - cdc_categories
      - cdc_datasets_category
      - cdc_tags
      - cdc_datasets_tag
      - cdc_browse
  - title: "Query"
    desc: "Perform queries to access data."
    contents:
      - cdc_query
      - cdc_fetch
  - title: "Requests"
    desc: "Build and perform httr2 requests"
    contents:
      - build_request
      - build_request2
      - perform_request
  - title: "Helpers"
    desc: "Helper functions to view datasets and generate metadata"
    contents:
      - cdc_count
      - cdc_columns
      - cdc_distinct
      - cdc_preview

navbar:
  title: "CDCdata"
  left:
    - icon: fa-home
      href: index.html
      aria-label: Home
    - icon: fa-balance-scale
      href: LICENSE.html
      aria-label: License document
    # - icon: fa-newspaper
    #   href: news/index.html
    - icon: fa-code
      href: "reference/"
      aria-label: Reference
    - text: "Guide"
      menu:
        - text: "Get Started"
          href: articles/get_started.html


  right:
    - icon: fab fa-github fa-lg
      href: https://github.com/patrekieta/CDCdata
      aria-label: Github link

  authors:
  Patrick Rekieta:
    href: https://github.com/patrekieta
